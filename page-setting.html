<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pengaturan - WebPOS</title>
  <link rel="stylesheet" href="css/themes.css">
  <style>
    .theme-option { 
      width: 60px; height: 60px; border-radius: 50%; cursor: pointer; 
      border: 3px solid transparent; display: inline-block; margin: 8px;
    }
    .theme-option.active { border-color: var(--primary); transform: scale(1.1); }
  </style>
</head>
<body class="theme-ocean">
  
  <div style="display: flex; min-height: 100vh;">
    <nav class="sidebar" style="width: 250px; padding: 20px;">
      <h2 class="text-primary" style="margin-bottom: 30px;">WebPOS</h2>
      <a href="index.html" style="display:block; padding: 12px; border-radius: 8px; margin-bottom: 8px;">📊 Dashboard</a>
      <a href="page-kasir.html" style="display:block; padding: 12px; border-radius: 8px; margin-bottom: 8px;">🛒 Kasir</a>
      <a href="page-setting.html" class="active" style="display:block; padding: 12px; border-radius: 8px; margin-bottom: 8px;">⚙️ Pengaturan</a>
    </nav>

    <main style="flex: 1; padding: 30px; max-width: 800px;">
      <h1 style="margin-bottom: 24px;">Pengaturan</h1>

      <!-- TEMA -->
      <div class="card" style="padding: 24px; margin-bottom: 24px;">
        <h3 style="margin-bottom: 16px;">🎨 Tema UI</h3>
        <p style="color: var(--text-secondary); margin-bottom: 12px;">Pilih tema (apply global ke semua halaman):</p>
        <div id="theme-selector">
          <div class="theme-option active" data-theme="ocean" style="background: linear-gradient(135deg, #0066cc, #e6f2ff);" onclick="selectTheme('ocean')"></div>
          <div class="theme-option" data-theme="sunset" style="background: linear-gradient(135deg, #e17055, #ffeaa7);" onclick="selectTheme('sunset')"></div>
          <div class="theme-option" data-theme="forest" style="background: linear-gradient(135deg, #2d6a4f, #d8f3dc);" onclick="selectTheme('forest')"></div>
          <div class="theme-option" data-theme="midnight" style="background: linear-gradient(135deg, #6c5ce7, #0f0f1a);" onclick="selectTheme('midnight')"></div>
          <div class="theme-option" data-theme="lavender" style="background: linear-gradient(135deg, #9b59b6, #f5eef8);" onclick="selectTheme('lavender')"></div>
          <div class="theme-option" data-theme="cherry" style="background: linear-gradient(135deg, #e84393, #fd79a8);" onclick="selectTheme('cherry')"></div>
          <div class="theme-option" data-theme="monochrome" style="background: linear-gradient(135deg, #2d3436, #dfe6e9);" onclick="selectTheme('monochrome')"></div>
          <div class="theme-option" data-theme="mint" style="background: linear-gradient(135deg, #00b894, #dff9fb);" onclick="selectTheme('mint')"></div>
          <div class="theme-option" data-theme="coffee" style="background: linear-gradient(135deg, #6f4e37, #eaddcf);" onclick="selectTheme('coffee')"></div>
          <div class="theme-option" data-theme="royal" style="background: linear-gradient(135deg, #f1c40f, #1a1a2e);" onclick="selectTheme('royal')"></div>
        </div>
      </div>

      <!-- PRINTER -->
      <div class="card" style="padding: 24px; margin-bottom: 24px;">
        <h3 style="margin-bottom: 16px;">🖨️ Printer Bluetooth</h3>
        <div style="margin-bottom: 12px;">
          <strong>Status:</strong> <span id="printer-status">Belum terhubung</span>
        </div>
        <button class="btn-primary" onclick="connectPrinter()">🔗 Hubungkan Printer</button>
        <div style="margin-top: 12px;">
          <label style="display: block; margin-bottom: 6px; color: var(--text-secondary);">Auto Print Struk</label>
          <input type="checkbox" id="auto-print" onchange="savePrinterConfig()">
        </div>
      </div>

      <!-- STRUK -->
      <div class="card" style="padding: 24px; margin-bottom: 24px;">
        <h3 style="margin-bottom: 16px;">🧾 Format Struk</h3>
        <div style="margin-bottom: 12px;">
          <label style="display: block; margin-bottom: 6px;">Header Struk</label>
          <textarea id="receipt-header" class="input" rows="3" placeholder="NAMA TOKO&#10;Alamat&#10;Telp"></textarea>
        </div>
        <div style="margin-bottom: 12px;">
          <label style="display: block; margin-bottom: 6px;">Footer Struk</label>
          <textarea id="receipt-footer" class="input" rows="3" placeholder="Terima Kasih"></textarea>
        </div>
        <button class="btn-primary" onclick="saveReceiptConfig()">💾 Simpan Format</button>
      </div>

      <button class="btn-primary" onclick="window.settingService.reset(); location.reload();" style="background: var(--danger);">🔄 Reset ke Default</button>
    </main>
  </div>

  <script src="js/services/setting-service.js"></script>
  <script src="js/services/transaction-service.js"></script>
  <script src="js/services/cash-service.js"></script>
  <script src="js/services/debt-service.js"></script>
  <script src="js/services/printer-service.js"></script>
  <script src="js/app.js"></script>

  <script>
    // Load current settings
    const cfg = window.settingService;
    
    // Apply active theme UI
    function selectTheme(name) {
      cfg.setTheme(name);
      document.querySelectorAll('.theme-option').forEach(el => {
        el.classList.toggle('active', el.dataset.theme === name);
      });
    }
    // Init active
    const currentTheme = cfg.getTheme();
    document.querySelectorAll('.theme-option').forEach(el => {
      el.classList.toggle('active', el.dataset.theme === currentTheme);
    });

    // Printer
    async function connectPrinter() {
      const result = await window.printerService.connect();
      if (result.success) {
        document.getElementById('printer-status').textContent = 'Terhubung: ' + result.deviceName;
        savePrinterConfig();
      } else {
        document.getElementById('printer-status').textContent = 'Gagal: ' + result.error;
      }
    }

    function savePrinterConfig() {
      cfg.setPrinterConfig({
        auto_print: document.getElementById('auto-print').checked,
        device_name: window.printerService.device?.name || null
      });
    }

    // Receipt
    const receipt = cfg.getReceiptConfig();
    document.getElementById('receipt-header').value = receipt.header;
    document.getElementById('receipt-footer').value = receipt.footer;

    function saveReceiptConfig() {
      cfg.setReceiptConfig({
        header: document.getElementById('receipt-header').value,
        footer: document.getElementById('receipt-footer').value
      });
      alert('Format struk disimpan');
    }
  </script>
</body>
</html>
