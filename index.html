<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - WebPOS</title>
  <link rel="stylesheet" href="css/themes.css">
</head>
<body class="theme-ocean">
  
  <div style="display: flex; min-height: 100vh;">
    <!-- Sidebar -->
    <nav class="sidebar" style="width: 250px; padding: 20px;">
      <h2 class="text-primary" style="margin-bottom: 30px;">WebPOS</h2>
      <a href="index.html" class="active" style="display:block; padding: 12px; border-radius: 8px; margin-bottom: 8px;">📊 Dashboard</a>
      <a href="page-kasir.html" style="display:block; padding: 12px; border-radius: 8px; margin-bottom: 8px;">🛒 Kasir</a>
      <a href="page-setting.html" style="display:block; padding: 12px; border-radius: 8px; margin-bottom: 8px;">⚙️ Pengaturan</a>
    </nav>

    <!-- Main Content -->
    <main style="flex: 1; padding: 30px;">
      <h1 style="margin-bottom: 24px;">Dashboard</h1>
      
      <!-- Summary Cards -->
      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px;">
        <div class="card" style="padding: 20px;">
          <div style="font-size: 12px; color: var(--text-secondary); margin-bottom: 8px;">MODAL AWAL</div>
          <div class="text-primary" style="font-size: 24px; font-weight: 700;" id="card-modal">Rp 0</div>
        </div>
        <div class="card" style="padding: 20px;">
          <div style="font-size: 12px; color: var(--text-secondary); margin-bottom: 8px;">TOTAL TRANSAKSI</div>
          <div class="text-primary" style="font-size: 24px; font-weight: 700;" id="card-transaksi">0</div>
        </div>
        <div class="card" style="padding: 20px;">
          <div style="font-size: 12px; color: var(--text-secondary); margin-bottom: 8px;">TOTAL LABA</div>
          <div style="font-size: 24px; font-weight: 700; color: var(--success);" id="card-laba">Rp 0</div>
        </div>
        <div class="card" style="padding: 20px;">
          <div style="font-size: 12px; color: var(--text-secondary); margin-bottom: 8px;">PIUTANG</div>
          <div style="font-size: 24px; font-weight: 700; color: var(--danger);" id="card-piutang">Rp 0</div>
        </div>
      </div>

      <!-- Cash Calculation -->
      <div class="card" style="padding: 24px; margin-bottom: 30px;">
        <h3 style="margin-bottom: 16px;">Perhitungan Kas Hari Ini</h3>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px;">
          <div><strong>Modal Awal:</strong> <span id="kas-modal">Rp 0</span></div>
          <div><strong>Uang Masuk:</strong> <span id="kas-masuk">Rp 0</span></div>
          <div><strong>Uang Keluar:</strong> <span id="kas-keluar">Rp 0</span></div>
          <div><strong>Penjualan:</strong> <span id="kas-penjualan">Rp 0</span></div>
          <div><strong>Top Up:</strong> <span id="kas-topup">Rp 0</span></div>
          <div><strong>Tarik Tunai:</strong> <span id="kas-tarik">Rp 0</span></div>
          <div><strong>Piutang:</strong> <span id="kas-piutang">Rp 0</span></div>
        </div>
      </div>

      <!-- Quick Actions (Navigasi saja, tidak ada logic) -->
      <div style="display: flex; gap: 12px; flex-wrap: wrap;">
        <button class="btn-primary" onclick="location.href='page-kasir.html'">🛒 Kasir</button>
        <button class="btn-primary" onclick="window.cashService.openShift(prompt('Modal awal:')||0); renderDashboard();" style="background: var(--success);">📂 Buka Shift</button>
        <button class="btn-primary" onclick="const s=window.cashService.closingShift(); alert('Shift ditutup. Total: Rp '+s.penjualan_produk);" style="background: var(--danger);">🔒 Closing Shift</button>
      </div>
    </main>
  </div>

  <!-- Services -->
  <script src="js/services/setting-service.js"></script>
  <script src="js/services/transaction-service.js"></script>
  <script src="js/services/cash-service.js"></script>
  <script src="js/services/debt-service.js"></script>
  <script src="js/services/printer-service.js"></script>
  <script src="js/app.js"></script>

  <script>
    function formatRupiah(num) {
      return 'Rp ' + Number(num).toLocaleString('id-ID');
    }

    function renderDashboard() {
      // READ ONLY: ambil dari service, tidak hitung manual
      const summary = window.cashService.getDailySummary();

      document.getElementById('card-modal').textContent = formatRupiah(summary.modal_awal);
      document.getElementById('card-transaksi').textContent = summary.total_transaksi;
      document.getElementById('card-laba').textContent = formatRupiah(summary.total_laba);
      document.getElementById('card-piutang').textContent = formatRupiah(summary.piutang_customer);

      document.getElementById('kas-modal').textContent = formatRupiah(summary.modal_awal);
      document.getElementById('kas-masuk').textContent = formatRupiah(summary.uang_masuk);
      document.getElementById('kas-keluar').textContent = formatRupiah(summary.uang_keluar);
      document.getElementById('kas-penjualan').textContent = formatRupiah(summary.penjualan_produk);
      document.getElementById('kas-topup').textContent = formatRupiah(summary.topup);
      document.getElementById('kas-tarik').textContent = formatRupiah(summary.tarik_tunai);
      document.getElementById('kas-piutang').textContent = formatRupiah(summary.piutang_customer);
    }

    // Render saat load & ketika transaksi selesai
    renderDashboard();
    window.addEventListener('transaction:completed', renderDashboard);
  </script>
</body>
</html>
