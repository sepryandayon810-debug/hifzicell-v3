<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0ea5e9">
  <title>Login — KasiRin</title>

  <link rel="stylesheet" href="css/themes.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-base);
      background: var(--bg);
      background-image: var(--gradient-surface);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      width: 100%;
      max-width: 420px;
    }

    .login-brand {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-brand .logo {
      width: 64px;
      height: 64px;
      background: var(--gradient-primary);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin: 0 auto 16px;
      box-shadow: 0 8px 24px rgba(var(--primary-rgb), 0.3);
    }

    .login-brand h1 {
      font-size: 24px;
      font-weight: 800;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .login-brand p {
      color: var(--text-secondary);
      font-size: 14px;
      margin-top: 4px;
    }

    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 32px;
      box-shadow: var(--shadow-lg);
    }

    .login-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      background: var(--bg);
      border-radius: 12px;
      padding: 4px;
    }

    .login-tab {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: transparent;
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .login-tab.active {
      background: var(--card);
      color: var(--primary);
      box-shadow: var(--shadow-sm);
    }

    .login-form {
      display: none;
    }

    .login-form.active {
      display: block;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .form-input {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      transition: all 0.25s;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(var(--primary-rgb), 0.1);
      background: var(--surface);
    }

    .form-input::placeholder {
      color: var(--text-muted);
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--gradient-primary);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
      box-shadow: 0 4px 12px rgba(var(--primary-rgb), 0.3);
    }

    .btn-login:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(var(--primary-rgb), 0.4);
    }

    .btn-login:active {
      transform: translateY(0) scale(0.98);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .login-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .error-msg {
      display: none;
      padding: 12px 16px;
      background: var(--danger-light);
      color: var(--danger);
      border-radius: 12px;
      font-size: 13px;
      margin-bottom: 16px;
      font-weight: 500;
    }

    .error-msg.show {
      display: block;
    }

    .error-msg.success {
      background: var(--success-light);
      color: var(--success);
    }

    .loading {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #fff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 480px) {
      .login-card {
        padding: 24px 20px;
        border-radius: 20px;
      }

      .login-brand h1 {
        font-size: 20px;
      }
    }
  </style>
<base target="_blank">
</head>
<body class="theme-ocean">

  <div class="login-container">
    <div class="login-brand">
      <div class="logo">🛒</div>
      <h1>WebPOS</h1>
      <p>Sistem Point of Sale Modern</p>
    </div>

    <div class="login-card">
      <div class="login-tabs">
        <button class="login-tab active" onclick="switchTab('login')" id="tab-login">Masuk</button>
        <button class="login-tab" onclick="switchTab('register')" id="tab-register">Daftar</button>
      </div>

      <div class="error-msg" id="error-msg"></div>

      <!-- Form Login -->
      <form class="login-form active" id="form-login" onsubmit="return doLogin(event)">
        <div class="form-group">
          <label class="form-label">Username</label>
          <input type="text" class="form-input" id="login-username" placeholder="kasir01" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="login-password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-login" id="btn-login">
          <span id="login-text">Masuk</span>
        </button>
      </form>

      <!-- Form Register -->
      <form class="login-form" id="form-register" onsubmit="return doRegister(event)">
        <div class="form-group">
          <label class="form-label">Nama Lengkap</label>
          <input type="text" class="form-input" id="reg-name" placeholder="Nama Kasir" required>
        </div>
        <div class="form-group">
          <label class="form-label">Username</label>
          <input type="text" class="form-input" id="reg-username" placeholder="kasir01" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="reg-password" placeholder="Min. 6 karakter" required minlength="6">
        </div>
        <div class="form-group">
          <label class="form-label">Role</label>
          <select class="form-input" id="reg-role" style="cursor:pointer;">
            <option value="Kasir">Kasir</option>
            <option value="Admin">Admin</option>
            <option value="Owner">Owner</option>
            <option value="Developer">Developer</option>
          </select>
        </div>
        <button type="submit" class="btn-login" id="btn-register">
          <span id="register-text">Daftar Akun</span>
        </button>
      </form>
    </div>

    <div class="login-footer">
      WebPOS v3 · Powered by Firebase
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <script src="js/core/firebase-config.js"></script>

  <script>
    // Helper: username → fake email
    function u2e(username) {
      return username.toLowerCase().trim() + "@webpos.local";
    }

    function switchTab(tab) {
      document.getElementById("form-login").classList.toggle("active", tab === "login");
      document.getElementById("form-register").classList.toggle("active", tab === "register");
      document.getElementById("tab-login").classList.toggle("active", tab === "login");
      document.getElementById("tab-register").classList.toggle("active", tab === "register");
      document.getElementById("error-msg").classList.remove("show");
    }

    function showError(msg, isSuccess) {
      var el = document.getElementById("error-msg");
      el.textContent = msg;
      el.classList.add("show");
      if (isSuccess) el.classList.add("success");
      else el.classList.remove("success");
    }

    function setLoading(btnId, textId, isLoading) {
      var btn = document.getElementById(btnId);
      var txt = document.getElementById(textId);
      btn.disabled = isLoading;
      txt.innerHTML = isLoading ? '<span class="loading"></span>Memproses...' : (btnId === "btn-login" ? "Masuk" : "Daftar Akun");
    }

    function doLogin(e) {
      e.preventDefault();
      setLoading("btn-login", "login-text", true);

      var username = document.getElementById("login-username").value.trim();
      var password = document.getElementById("login-password").value;
      var email = u2e(username);

      auth.signInWithEmailAndPassword(email, password)
        .then(function(cred) {
          return db.ref("users/" + cred.user.uid).once("value");
        })
        .then(function(snap) {
          var userData = snap.val();
          if (userData) {
            localStorage.setItem("webpos_session_v3", JSON.stringify({
              id: auth.currentUser.uid,
              name: userData.name,
              username: userData.username || username,
              role: userData.role,
              email: userData.email || email
            }));
          }
          window.location.href = "index.html";
        })
        .catch(function(err) {
          setLoading("btn-login", "login-text", false);
          var msg = err.message;
          if (msg.indexOf("user-not-found") !== -1) msg = "Username tidak ditemukan";
          if (msg.indexOf("wrong-password") !== -1) msg = "Password salah";
          showError("Login gagal: " + msg);
        });

      return false;
    }

    function doRegister(e) {
      e.preventDefault();
      setLoading("btn-register", "register-text", true);

      var name = document.getElementById("reg-name").value.trim();
      var username = document.getElementById("reg-username").value.trim().toLowerCase();
      var password = document.getElementById("reg-password").value;
      var role = document.getElementById("reg-role").value;
      var email = u2e(username);

      // Cek username sudah dipakai belum
      db.ref("users").orderByChild("username").equalTo(username).once("value")
        .then(function(snap) {
          if (snap.val()) {
            throw new Error("Username sudah dipakai");
          }
          return auth.createUserWithEmailAndPassword(email, password);
        })
        .then(function(cred) {
          return db.ref("users/" + cred.user.uid).set({
            name: name,
            username: username,
            email: email,
            role: role,
            createdAt: new Date().toISOString()
          });
        })
        .then(function() {
          setLoading("btn-register", "register-text", false);
          showError("✅ Akun berhasil dibuat! Silakan masuk.", true);
          switchTab("login");
        })
        .catch(function(err) {
          setLoading("btn-register", "register-text", false);
          showError("Daftar gagal: " + err.message);
        });

      return false;
    }

    // Kalau sudah login, langsung ke dashboard
    auth.onAuthStateChanged(function(user) {
      if (user) {
        window.location.href = "index.html";
      }
    });
  </script>
</body>
</html>
